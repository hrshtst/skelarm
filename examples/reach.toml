# A complete reaching scenario: robot + start state + task + controller.
# Interactive GUI (drag to apply external forces):
#   uv run python tools/reaching_simulator.py examples/reach.toml
# Headless run that saves a log to replay:
#   uv run python tools/reaching_simulator.py examples/reach.toml --save reach.sklog.npz
#   uv run python tools/player.py reach.sklog.npz
# Scripted version that plots the reach:  uv run python examples/reaching.py

[skeleton]
base_length = 0.0

[[skeleton.link]]
length = 1.0
mass = 1.0
inertia = 0.1
com = [0.5, 0.0]
limits = [-180.0, 180.0]

[[skeleton.link]]
length = 0.8
mass = 0.8
inertia = 0.05
com = [0.4, 0.0]
limits = [-180.0, 180.0]

[initial]
q = [34.4, 57.3]  # degrees; endpoint starts near (0.80, 1.36) m

[task]
type = "reaching"      # task kind (currently only "reaching")
# The target may be a plain [x, y] array, or a table with optional
# label / color (default purple) / tolerance. The tolerance (meters) is the
# admittable tip-to-target error; the marker's ring is drawn at that radius.
target = { pos = [0.55, 1.21], tolerance = 0.02 }  # endpoint goal (m), 2 cm success
duration = 2.0         # simulated time / planned-motion horizon (s)
schedule = "minimum_jerk"

[simulator]
dt = 0.002             # control / integration step (s)
# enforce_limits = true  # joint-limit hard stop in the dynamics (default)

[controller]
type = "computed_torque"
kp = 200.0
kd = 30.0
