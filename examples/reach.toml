# A complete reaching scenario: robot + start state + task + controller.
# Interactive GUI (drag to apply external forces):
#   uv run python tools/reaching_simulator.py examples/reach.toml
# Headless run that saves a log to replay:
#   uv run python tools/reaching_simulator.py examples/reach.toml --save reach.sklog.npz
#   uv run python tools/player.py reach.sklog.npz
# Scripted version that plots the reach:  uv run python examples/reaching.py

[skeleton]
base_length = 0.0

[[skeleton.link]]
length = 1.0
mass = 1.0
inertia = 0.1
com = [0.5, 0.0]
limits = [-180.0, 180.0]

[[skeleton.link]]
length = 0.8
mass = 0.8
inertia = 0.05
com = [0.4, 0.0]
limits = [-180.0, 180.0]

[initial]
q = [34.4, 57.3]  # degrees; endpoint starts near (0.80, 1.36) m

[task]
target = [0.55, 1.21]  # endpoint goal (x, y) in meters
duration = 2.0         # simulated time (s)
dt = 0.002             # control / integration step (s)
schedule = "minimum_jerk"

[controller]
type = "computed_torque"
kp = 200.0
kd = 30.0
