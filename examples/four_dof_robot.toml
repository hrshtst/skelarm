# Configuration for a 4-DOF robot arm.
#
# The first (base) link is fixed and configured via the top-level base_length;
# the four movable links follow as [[skeleton.link]] entries. Joint limits are in
# degrees, and `com` is the center of mass [x, y] relative to the joint.

[skeleton]
base_length = 0.05

[[skeleton.link]]
length = 0.1
mass = 0.5
inertia = 0.005
com = [0.05, 0.0]
limits = [-20.0, 30.0]

[[skeleton.link]]
length = 0.25
mass = 1.0
inertia = 0.01
com = [0.1, 0.0]
limits = [0.0, 120.0]

[[skeleton.link]]
length = 0.25
mass = 1.0
inertia = 0.007
com = [0.1, 0.0]
limits = [0.0, 150.0]

[[skeleton.link]]
length = 0.15
mass = 0.5
inertia = 0.003
com = [0.05, 0.0]
limits = [-20.0, 90.0]
