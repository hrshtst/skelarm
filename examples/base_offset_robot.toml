# Example robot configuration with a non-zero fixed base link.
#
# Skeleton keys live under the [skeleton] table. `base_length` is optional
# (default 0.0); it models a fixed pedestal that offsets the first actuated
# joint to (base_length, 0) along +x. It is stored as the non-actuated zeroth
# link (no joint, mass, or limits).
#
# Because the robot is namespaced under [skeleton], it can later share a single
# combined file with [task] / [controller] sections for reproducible runs.

[skeleton]
base_length = 0.5

[[skeleton.link]]
length = 1.0
mass = 1.0
inertia = 0.1
com = [0.5, 0.0]        # Center of mass [x, y] relative to joint
limits = [-180.0, 180.0]  # Joint limits [min, max] in degrees

[[skeleton.link]]
length = 0.8
mass = 0.8
inertia = 0.05
com = [0.4, 0.0]
limits = [-180.0, 180.0]

# Initial state (a run condition): one value per joint, in degrees.
[initial]
q = [30.0, 0.0]   # Initial joint angles
