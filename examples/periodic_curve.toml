# Periodic-curve tracing: the tip follows a closed task-space curve, repeatedly.
# Run: uv run python examples/periodic_curve.py
# Swap `curve` (circle, ellipse, lemniscate, vertical_lemniscate, rose) to trace
# a different shape; see docs/guides/control_configuration.md for each curve's params.

[skeleton]
[[skeleton.link]]
length = 1.0
mass = 1.0
inertia = 0.1
com = [0.5, 0.0]
limits = [-180.0, 180.0]

[[skeleton.link]]
length = 0.8
mass = 0.8
inertia = 0.05
com = [0.4, 0.0]
limits = [-180.0, 180.0]

[initial]
q = [20.0, 40.0]   # degrees (also seeds the reference IK)

[task]
type = "periodic_curve"
curve = "ellipse"
center = [0.9, 0.0]
a = 0.4            # x semi-axis (m)
b = 0.25           # y semi-axis (m)
period = 2.0       # seconds per loop
duration = 4.0     # two loops

[simulator]
dt = 0.005

[controller]
type = "computed_torque"
kp = 400.0
kd = 50.0
