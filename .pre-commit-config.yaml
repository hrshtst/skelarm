repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe'] # mkdocs.yml uses the !!python/name: tag for Mermaid
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8 # Ensure this matches or is newer than pyproject.toml
    hooks:
      # Run the linter and apply fixes
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --config=pyproject.toml]
      # Run the formatter
      - id: ruff-format
        files: \.py$

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false # basedpyright needs full project context, not just changed files
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false # mypy resolves its file set and config from pyproject.toml
