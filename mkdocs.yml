site_name: Skelarm Documentation
site_description: A simple dynamics simulator for a configurable planar robot arm.
repo_url: https://github.com/hrshtst/skelarm
repo_name: hrshtst/skelarm
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/mermaid-zoom.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
  - javascripts/mermaid-zoom.js

nav:
  - Home: index.md
  - Theory Reference:
      - Overview: reference/index.md
      - Kinematics: reference/01_kinematics.md
      - Differential Kinematics: reference/02_differential_kinematics.md
      - Inverse Dynamics: reference/03_inverse_dynamics.md
      - Forward Dynamics: reference/04_forward_dynamics.md
      - Numerical Methods: reference/05_numerical_methods.md
      - Numerical Inverse Kinematics: reference/06_numerical_inverse_kinematics.md
      - Trajectory Tracking Control: reference/07_control.md
      - Reaching Control: reference/08_reaching_control.md
  - Guides:
      - Robot Configuration: guides/robot_configuration.md
      - Control Configuration: guides/control_configuration.md
  - API Reference:
      - Architecture: api/architecture.md
      - Skeleton: api/skeleton.md
      - Kinematics: api/kinematics.md
      - Dynamics: api/dynamics.md
      - Trajectory: api/trajectory.md
      - Control: api/control.md
      - Reaching: api/reaching.md
      - MPC: api/mpc.md
      - Scenario: api/scenario.md
      - Recording: api/recording.md
      - Plotting: api/plotting.md
      - Canvas: api/canvas.md
      - Simulator: api/simulator.md
