name: Publish to PyPI

on:
  release:
    types: [published]

env:
  UV_VERSION: "0.11.6"

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build package
        run: uv build

      # uv build writes a dist/.gitignore that twine (used by the publish
      # action) rejects as an unknown distribution format.
      - name: Remove non-distribution files
        run: rm -f dist/.gitignore

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
